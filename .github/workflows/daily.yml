name: Automated Market Analytics

on:
  schedule:
    # Пн-Пт в 23:10 по Израилю (20:10 UTC) — Рыночная аналитика
    - cron: '10 20 * * 1-5'
    # Суббота в 22:00 по Израилю (19:00 UTC) — IPO отчет
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy Architecture Files
        run: |
          mkdir -p modules
          touch modules/__init__.py
          
          cat << 'EOF' > requirements.txt
          aiohttp==3.11.11
          beautifulsoup4==4.12.3
          lxml==5.1.0
          EOF
          
          cat << 'EOF' > modules/config.py
          import os
          BOT_TOKEN = os.getenv("BOT_TOKEN")
          CHAT_ID = os.getenv("CHAT_ID")
          HTTP_TIMEOUT = 10
          BOT_NAME = "@oil_tracker_pavel_bot"
          
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept-Language": "he-IL,he;q=0.9,en-US;q=0.8,en;q=0.7"
          }

          SECTORS_CONFIG = {
              "Oil": {"name": "Нефть и Энергетика", "icon": "🛢️", "short_eng": "Oil", "news_ticker": "USO", "il_fund": "5141841", "il_name_eng": "WTI Ultra x3", "tickers": ["BZ=F", "CL=F", "USO", "OVX"]},
              "Cybersecurity": {"name": "Кибербезопасность", "icon": "🛡️", "short_eng": "Cyber", "news_ticker": "CIBR", "il_fund": "5125828", "il_name_eng": "IBI Cybersecurity", "tickers": ["CIBR", "HACK", "CRWD", "PANW", "FTNT", "ZS"]},
              "Gold": {"name": "Золото и Металлы", "icon": "🥇", "short_eng": "Gold", "news_ticker": "GLD", "il_fund": "5129481", "il_name_eng": "Tachlit Gold Spot", "tickers": ["GLD", "GDX", "SLV"]},
              "Clean Energy": {"name": "Зеленая энергетика", "icon": "☀️", "short_eng": "Clean", "news_ticker": "FSLR", "il_fund": "5132642", "il_name_eng": "Meitav Clean Energy", "tickers": ["ICLN", "TAN", "FAN", "FSLR", "ENPH"]},
              "Aerospace": {"name": "Авиация и Космос", "icon": "✈️", "short_eng": "Aero", "news_ticker": "ITA", "il_fund": "5136015", "il_name_eng": "Tachlit US Aerospace", "tickers": ["BA", "EADSY", "LMT", "RTX", "ITA"]},
              "Biotech": {"name": "Биотех и Медицина", "icon": "🏥", "short_eng": "Bio", "news_ticker": "LLY", "il_fund": "5122585", "il_name_eng": "Harel Nasdaq Biotech", "tickers": ["LLY", "NVO", "PFE", "MRNA", "AMGN", "XBI", "IBB"]},
              "Cloud": {"name": "Облачные технологии", "icon": "☁️", "short_eng": "Cloud", "news_ticker": "WCLD", "il_fund": "5132170", "il_name_eng": "Harel Cloud Comp.", "tickers": ["MSFT", "AMZN", "GOOGL", "ORCL", "SNOW", "WCLD", "CLOU"]},
              "Banking": {"name": "Банковский сектор", "icon": "🏦", "short_eng": "Bank", "news_ticker": "JPM", "il_fund": "5132337", "il_name_eng": "Meitav Banks US", "tickers": ["JPM", "BAC", "GS", "MS", "WFC", "XLF", "KBE"]},
              "Uranium": {"name": "Уран и Атомная энергетика", "icon": "☢️", "short_eng": "Uran", "news_ticker": "CCJ", "il_fund": "5138136", "il_name_eng": "More Uranium Giants", "tickers": ["URA", "URNM", "CCJ", "NXE"]},
              "Gaming": {"name": "Игровая Индустрия", "icon": "🎮", "short_eng": "Game", "news_ticker": "SONY", "il_fund": "5128624", "il_name_eng": "MTF Bluestar E-Games", "tickers": ["NVDA", "MSFT", "TTWO", "EA", "RBLX", "SONY", "NTDOY", "UBSFY", "ESPO", "HERO", "GAMR"]},
              "EV": {"name": "Электромобили", "icon": "🚗", "short_eng": "EV", "news_ticker": "TSLA", "il_fund": "5132535", "il_name_eng": "Migdal EV & Auto", "tickers": ["TSLA", "BYDDY", "RIVN", "LI", "DRIV"]},
              "E-Commerce": {"name": "Электронная коммерция", "icon": "🛒", "short_eng": "Ecom", "news_ticker": "IBUY", "il_fund": "5131420", "il_name_eng": "Meitav E-Commerce", "tickers": ["AMZN", "SHOP", "MELI", "IBUY"]},
              "Semiconductors": {"name": "Полупроводники", "icon": "💻", "short_eng": "Semi", "news_ticker": "SOXX", "il_fund": "5135355", "il_name_eng": "Kasam Semiconductors", "tickers": ["NVDA", "AMD", "AVGO", "QCOM", "TSM", "ASML", "INTC", "SOXX", "SMH"]},
              "AI": {"name": "Искусственный Интеллект", "icon": "🤖", "short_eng": "AI", "news_ticker": "NVDA", "il_fund": "5140744", "il_name_eng": "Migdal AI", "tickers": ["NVDA", "MSFT", "AMD", "AVGO", "PLTR", "GOOGL", "AMZN", "TSM", "BOTZ", "AIQ", "ROBO", "IRBO"]}
          }
          EOF
          
          cat << 'EOF' > modules/market.py
          import aiohttp
          import asyncio
          import re
          import json
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def fetch_single_ticker(session: aiohttp.ClientSession, ticker: str) -> tuple:
              api_ticker = f"^{ticker}" if ticker == "OVX" else ticker
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{api_ticker}?range=1d&interval=1m"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          data = await response.json()
                          result = data.get("chart", {}).get("result", [])
                          if result:
                              meta = result[0].get("meta", {})
                              price = meta.get("regularMarketPrice")
                              prev_close = meta.get("chartPreviousClose")
                              if price is not None and prev_close:
                                  change = ((price - prev_close) / prev_close) * 100
                                  return ticker, {"price": round(price, 2), "change": round(change, 2)}
              except Exception as e:
                  print(f"Ошибка Yahoo [{ticker}]: {e}")
              return ticker, {"price": 0.0, "change": 0.0}

          async def fetch_all_yahoo_data(tickers: list) -> dict:
              async with aiohttp.ClientSession() as session:
                  tasks = [fetch_single_ticker(session, t) for t in tickers]
                  results = await asyncio.gather(*tasks)
                  return dict(results)

          async def fetch_israeli_fund_by_id(session: aiohttp.ClientSession, key: str, fund_id: str) -> tuple:
              """Запрашивает результат закрытия конкретного фонда по его номеру в Google/TASE API."""
              if not fund_id:
                  return key, 0.0

              # 1. Прямой запрос к API Funder по конкретному номеру фонда
              url_funder = f"https://www.funder.co.il/fund/{fund_id}"
              try:
                  async with session.get(url_funder, headers=HEADERS, timeout=HTTP_TIMEOUT) as resp:
                      if resp.status == 200:
                          html = await resp.text()
                          # Ищем строго процент изменения этого конкретного фонда
                          match = re.search(r'id=["\']?dailyChange["\']?[^>]*>([-+]?\d+(?:\.\d+)?)%?', html)
                          if not match:
                              match = re.search(r'([+-]?\d+(?:\.\d+)?)\s*%\s*<\/span>', html)
                          if match:
                              val = float(match.group(1))
                              print(f"🎯 Фонд {fund_id} ({key}): {val}%")
                              return key, round(val, 2)
              except Exception as e:
                  print(f"Ошибка Funder [{fund_id}]: {e}")

              # 2. Фоллбэк: индивидуальный запрос к Google Finance по номеру
              url_google = f"https://www.google.com/finance/quote/{fund_id}:TASE"
              try:
                  async with session.get(url_google, headers=HEADERS, timeout=HTTP_TIMEOUT) as resp:
                      if resp.status == 200:
                          html = await resp.text()
                          match = re.search(r'data-percentage-change=["\']([-+]?\d+(?:\.\d+)?)["\']', html)
                          if match:
                              val = float(match.group(1))
                              print(f"🎯 Google Finance {fund_id} ({key}): {val}%")
                              return key, round(val, 2)
              except Exception as e:
                  print(f"Ошибка Google Finance [{fund_id}]: {e}")

              print(f"⚠️ Данные по фонду {fund_id} не найдены (0.0)")
              return key, 0.0

          async def fetch_all_israeli_funds(fund_map: dict) -> dict:
              async with aiohttp.ClientSession() as session:
                  tasks = [fetch_israeli_fund_by_id(session, k, fid) for k, fid in fund_map.items()]
                  results = await asyncio.gather(*tasks)
                  return {k: {"price": 0.0, "change": v} for k, v in results}
          EOF
          
          cat << 'EOF' > modules/news.py
          import aiohttp, urllib.parse, html, re
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def translate_text(session: aiohttp.ClientSession, text: str) -> str:
              try:
                  url = f"https://api.mymemory.translated.net/get?q={urllib.parse.quote(text)}&langpair=en|ru"
                  async with session.get(url, timeout=5) as resp:
                      if resp.status == 200:
                          translated = (await resp.json()).get("responseData", {}).get("translatedText", text)
                          return html.unescape(translated)
              except: pass
              return text

          async def fetch_sector_news(session: aiohttp.ClientSession, query_ticker: str) -> list:
              url = f"https://query1.finance.yahoo.com/v1/finance/search?q={query_ticker}"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items:
                              title = item.get("title", "")
                              if title and len(title) > 15:
                                  translated = await translate_text(session, title)
                                  return [f"• {translated}"]
              except: pass
              return ["• Торгуется в рамках текущей рыночной динамики."]

          async def fetch_ipo_news(session: aiohttp.ClientSession) -> list:
              url = "https://query1.finance.yahoo.com/v1/finance/search?q=IPO"
              ipo_news = []
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items[:5]:
                              title = item.get("title", "")
                              if title:
                                  translated = await translate_text(session, title)
                                  ipo_news.append(f"📌 {translated}")
              except: pass
              return ipo_news or ["📌 Публикаций по IPO на этой неделе не зафиксировано."]
          EOF
          
          cat << 'EOF' > modules/formatter.py
          from datetime import datetime, timezone, timedelta
          from modules.config import BOT_NAME

          def escape_html(text: str) -> str:
              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def build_telegram_message(sectors_data: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y | %H:%M")
              
              lines = [
                  "📈 <b>РЫНОЧНЫЙ ДАЙДЖЕСТ И АНАЛИТИКА</b>",
                  f"📅 {now_str} (IDT) 🇮🇱\n",
                  "<b>📊 ОБЗОР СЕКТОРОВ (US) И ФОНДОВ (IL)</b>",
                  "<code>Сектор       US      IL   Рейтинг</code>",
                  "<code>---------------------------------</code>",
                  "<code>"
              ]
              
              for s in sectors_data:
                  icon = s['icon']
                  name = s['short_eng'][:6]
                  us_ch = s['avg_change']
                  il_ch = s['il_fund_data']['change']
                  
                  us_str = f"+{us_ch:.1f}%" if us_ch > 0 else f"{us_ch:.1f}%"
                  il_str = f"+{il_ch:.1f}%" if il_ch > 0 else f"{il_ch:.1f}%"
                  
                  score_emoji = "🟢" if s['score'] >= 65 else ("🟡" if s['score'] >= 40 else "🔴")
                  lines.append(f"{icon}{name:<6} {us_str:>6} {il_str:>6}  {score_emoji}{s['score']:>3}/100")
              lines.append("</code>\n")

              lines.append("<blockquote expandable>")
              lines.append("🔍 <b>ДРАЙВЕРЫ ДВИЖЕНИЯ И НОВОСТИ</b>\n")
              for s in sectors_data:
                  ch_sign = f"+{s['avg_change']:.2f}%" if s['avg_change'] > 0 else f"{s['avg_change']:.2f}%"
                  lines.append(f"<b>{s['icon']} {s['name']}</b> ({ch_sign})")
                  for n in s['news']:
                      lines.append(f"  {escape_html(n)}")
              lines.append("</blockquote>")

              lines.append("\n🇮🇱 <b>ФОНДЫ ТЕЛЬ-АВИВА (ИТОГИ ТОРГОВ)</b>")
              lines.append("<code>---------------------------------</code>")
              for s in sectors_data:
                  il_ch = s['il_fund_data']['change']
                  ch_emoji = "🟢" if il_ch > 0 else ("🔴" if il_ch < 0 else "⚪")
                  ch_sign = f"+{il_ch:.2f}%" if il_ch > 0 else f"{il_ch:.2f}%"
                  lines.append(f"{ch_emoji} <code>{s['icon']} {s['il_name_eng']:<20} | {ch_sign:>7}</code>")

              lines.append(f"\n⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡️\n{BOT_NAME}")
              return "\n".join(lines)

          def build_ipo_message(ipo_news: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y")
              
              lines = [
                  "🔔 <b>ЕЖЕНЕДЕЛЬНЫЙ IPO ДАЙДЖЕСТ</b>",
                  f"📅 {now_str} | Субботний обзор 🇮🇱\n",
                  "<blockquote expandable>"
              ]
              for news in ipo_news:
                  lines.append(f"{escape_html(news)}\n")
              lines.append("</blockquote>")
              lines.append(f"\n⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡️\n{BOT_NAME}")
              return "\n".join(lines)
          EOF
          
          cat << 'EOF' > modules/telegram_sender.py
          import aiohttp
          from modules.config import BOT_TOKEN, CHAT_ID, HTTP_TIMEOUT
          
          async def send_to_telegram(text: str):
              if not BOT_TOKEN or not CHAT_ID:
                  print("❌ BOT_TOKEN или CHAT_ID не найдены")
                  return
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              payload = {"chat_id": CHAT_ID, "text": text, "parse_mode": "HTML", "disable_web_page_preview": True}
              async with aiohttp.ClientSession() as session:
                  try:
                      async with session.post(url, json=payload, timeout=HTTP_TIMEOUT) as resp:
                          if resp.status == 200:
                              print("🚀 Сообщение отправлено!")
                          else:
                              print(f"❌ Ошибка Telegram: {await resp.text()}")
                  except Exception as e:
                      print(f"💥 Ошибка: {e}")
          EOF
          
          cat << 'EOF' > main.py
          import asyncio, aiohttp
          from datetime import datetime, timezone, timedelta
          from modules.config import SECTORS_CONFIG
          from modules.market import fetch_all_yahoo_data, fetch_all_israeli_funds
          from modules.news import fetch_sector_news, fetch_ipo_news
          from modules.formatter import build_telegram_message, build_ipo_message
          from modules.telegram_sender import send_to_telegram

          def calculate_sector_score(avg_change: float) -> int:
              return max(0, min(100, int(50 + (avg_change * 15.0))))

          async def run_market_analytics():
              all_tickers = set()
              for cfg in SECTORS_CONFIG.values():
                  all_tickers.update(cfg["tickers"])
              
              print(f"📦 Сбор данных Yahoo Finance...")
              global_market_data = await fetch_all_yahoo_data(list(all_tickers))

              fund_map = {key: cfg["il_fund"] for key, cfg in SECTORS_CONFIG.items() if cfg["il_fund"]}
              print(f"🌐 Индивидуальные запросы по фондам в Израиле...")
              il_results = await fetch_all_israeli_funds(fund_map)

              async with aiohttp.ClientSession() as session:
                  sectors_results = []
                  
                  for key, cfg in SECTORS_CONFIG.items():
                      valid_changes = [global_market_data[t]["change"] for t in cfg["tickers"] if t in global_market_data and global_market_data[t]["price"] > 0]
                      avg_change = sum(valid_changes) / len(valid_changes) if valid_changes else 0.0
                      
                      score = calculate_sector_score(avg_change)
                      news = await fetch_sector_news(session, cfg["news_ticker"])
                      
                      sectors_results.append({
                          "short_eng": cfg["short_eng"],
                          "name": cfg["name"],
                          "icon": cfg["icon"],
                          "avg_change": round(avg_change, 2),
                          "score": score,
                          "news": news,
                          "il_name_eng": cfg["il_name_eng"],
                          "il_fund_data": il_results.get(key, {"price": 0.0, "change": 0.0})
                      })
                      
                  message = build_telegram_message(sectors_results)
                  await send_to_telegram(message)

          async def run_ipo_digest():
              async with aiohttp.ClientSession() as session:
                  ipo_news = await fetch_ipo_news(session)
                  message = build_ipo_message(ipo_news)
                  await send_to_telegram(message)

          async def main():
              tz_il = timezone(timedelta(hours=3))
              weekday = datetime.now(tz_il).weekday()
              
              if weekday == 5:
                  await run_ipo_digest()
              else:
                  await run_market_analytics()

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
