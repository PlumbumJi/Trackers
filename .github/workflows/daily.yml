                  "il_name_eng": "More Uranium Giants",
                  "tickers": ["URA", "URNM", "CCJ", "NXE"]
              },
              "Gold": {
                  "name": "Золото и Металлы", "icon": "🥇", "short_eng": "Gold", "news_ticker": "GLD", "il_fund": "5129481", 
                  "il_name_eng": "Tachlit Gold Spot",
                  "tickers": ["GLD", "GDX", "SLV"]
              },
              "Cybersecurity": {
                  "name": "Кибербезопасность", "icon": "🛡️", "short_eng": "Cyber", "news_ticker": "CIBR", "il_fund": "5125828", 
                  "il_name_eng": "IBI Cybersecurity",
                  "tickers": ["CIBR", "HACK", "CRWD", "PANW", "FTNT", "ZS"]
