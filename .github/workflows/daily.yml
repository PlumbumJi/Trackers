                  "tickers": ["NVDA", "MSFT", "AMD", "AVGO", "PLTR", "GOOGL", "AMZN", "TSM", "BOTZ", "AIQ", "ROBO", "IRBO"]
              },
              "Gaming": {
                  "name": "Игровая Индустрия", "icon": "🎮", "short_eng": "Game", "news_ticker": "SONY", "il_fund": "5128624", 
                  "il_name_eng": "MTF Bluestar E-Games",
                  "tickers": ["NVDA", "MSFT", "TTWO", "EA", "RBLX", "SONY", "NTDOY", "UBSFY", "ESPO", "HERO", "GAMR"]
              },
              "Semiconductors": {
                  "name": "Полупроводники", "icon": "💻", "short_eng": "Semi", "news_ticker": "SOXX", "il_fund": "5135355", 
                  "il_name_eng": "Kasam Semiconductors",
                  "tickers": ["NVDA", "AMD", "AVGO", "QCOM", "TSM", "ASML", "INTC", "SOXX", "SMH"]
              },
              "Banking": {
                  "name": "Банковский сектор", "icon": "🏦", "short_eng": "Bank", "news_ticker": "JPM", "il_fund": "5132337", 
                  "il_name_eng": "Meitav Banks US",
                  "tickers": ["JPM", "BAC", "GS", "MS", "WFC", "XLF", "KBE"]
              },
              "Biotech": {
                  "name": "Биотех и Медицина", "icon": "🏥", "short_eng": "Bio", "news_ticker": "LLY", "il_fund": "5122585", 
