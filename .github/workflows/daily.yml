          cat << 'EOF' > modules/market.py
          import aiohttp
          import asyncio
          import re
          import random
          from modules.config import HTTP_TIMEOUT, HEADERS

          # Playwright
          _playwright_available = False
          try:
              from playwright.async_api import async_playwright
              _playwright_available = True
          except ImportError:
              pass

          def parse_float(val) -> float | None:
              if val is None:
                  return None
              try:
                  cleaned = str(val).replace(',', '.').replace('%', '').replace('+', '').strip()
                  match = re.search(r'([+-]?\d+(?:\.\d+)?)', cleaned)
                  if match:
                      res = float(match.group(1))
                      if -25.0 <= res <= 25.0:
                          return round(res, 2)
              except Exception:
                  pass
              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 1 — Playwright (обход Cloudflare)
          # ═════════════════════════════════════════════════════════════════════

          async def _try_playwright_bizportal(fund_id: str) -> float | None:
              if not _playwright_available:
                  return None
              
              url = f"https://www.bizportal.co.il/mutualfunds/quote/generalview/{fund_id}"
              
              try:
                  async with async_playwright() as p:
                      browser = await p.chromium.launch(headless=True)
                      context = await browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                          locale="he-IL",
                          timezone_id="Asia/Jerusalem",
                      )
                      page = await context.new_page()
                      await page.goto(url, wait_until="networkidle", timeout=30000)
                      await asyncio.sleep(3)
                      
                      html = await page.content()
                      await browser.close()
                      
                      patterns = [
                          r'מחיר\s*קנייה\s*</td>\\s*<td[^>]*>\\s*(\\d+\\.?\\d*)\\s*</td>\\s*<td[^>]*>\\s*([+-]?\\d+\\.?\\d*)%',
                          r'>([+-]?\\d+\\.?\\d*)%<',
                          r'"DailyChangePercent"[:\\s]*"?([+-]?\\d+\\.?\\d*)"?',
                          r'"ChangePercent"[:\\s]*"?([+-]?\\d+\\.?\\d*)"?',
                      ]
                      
                      for pattern in patterns:
                          match = re.search(pattern, html, re.IGNORECASE | re.DOTALL)
                          if match:
                              val_str = match.group(2) if len(match.groups()) > 1 and match.group(2) else match.group(1)
                              val = parse_float(val_str)
                              if val is not None:
                                  print(f"   ✅ Playwright: {val}%")
                                  return val
                              
              except Exception as e:
                  print(f"   💥 Playwright: {str(e)[:60]}")
              
              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 2 — Jina с retry
          # ═════════════════════════════════════════════════════════════════════

          async def _try_jina_with_retry(session: aiohttp.ClientSession, fund_id: str, max_retries: int = 3) -> float | None:
              url = f"https://r.jina.ai/http://www.bizportal.co.il/mutualfunds/quote/generalview/{fund_id}"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "text/plain,*/*",
              }
              
              for attempt in range(max_retries):
                  try:
                      async with session.get(url, headers=headers, timeout=40) as resp:
                          if resp.status == 200:
                              text = await resp.text()
                              
                              # Паттерн 1: מחיר קנייה -> число -> процент
                              match = re.search(r'מחיר\\s*קנייה\\s*\\n?\\s*\\d+\\.?\\d*\\s*\\n?\\s*([+-]?\\d+\\.?\\d*)%', text, re.MULTILINE)
                              if match:
                                  val = parse_float(match.group(1))
                                  if val is not None:
                                      print(f"   ✅ Jina (attempt {attempt+1}): {val}%")
                                      return val
                              
                              # Паттерн 2: любой процент в начале
                              lines = text.split('\\n')
                              for i, line in enumerate(lines[:40]):
                                  m = re.search(r'([+-]?\\d+\\.?\\d*)%', line)
                                  if m:
                                      val = parse_float(m.group(1))
                                      if val is not None and val != 0.0:
                                          prev = ' '.join(lines[max(0,i-3):i])
n                                          if not any(x in prev for x in ['שנה', 'חודש', 'חצי', 'תשואה', 'שנתי']):
                                              print(f"   ✅ Jina fallback (attempt {attempt+1}): {val}%")
n                                              return val
                          
                          elif resp.status == 403:
                              print(f"   🚫 Jina 403 (attempt {attempt+1})")
n                          else:
n                              print(f"   ⚠️ Jina HTTP {resp.status} (attempt {attempt+1})")
n                  except Exception as e:
n                      print(f"   💥 Jina error (attempt {attempt+1}): {str(e)[:60]}")
n                  \n                  if attempt < max_retries - 1:
n                      await asyncio.sleep(2 ** attempt)  # exponential backoff\n              \n              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 3 — textise dot iitty (другой прокси)
          # ═════════════════════════════════════════════════════════════════════

          async def _try_textise(session: aiohttp.ClientSession, fund_id: str) -> float | None:
n              proxies = [
n                  f"https://r.jina.ai/http://www.bizportal.co.il/mutualfunds/quote/generalview/{fund_id}",
n                  f"https://r.jina.ai/http://www.funder.co.il/fund/{fund_id}",
n              ]
n              \n              for url in proxies:
n                  try:
n                      async with session.get(url, timeout=35) as resp:\n                          if resp.status == 200:\n                              text = await resp.text()\n                              match = re.search(r'([+-]?\\d+\\.?\\d*)%', text)\n                              if match:\n                                  val = parse_float(match.group(1))\n                                  if val is not None:\n                                      print(f"   ✅ Textise: {val}%")\n                                      return val\n                  except:\n                      pass\n              return None

          # ═════════════════════════════════════════════════════════════════════
          # ГЛАВНАЯ ФУНКЦИЯ
          # ═════════════════════════════════════════════════════════════════════

          async def fetch_israeli_fund_data(session: aiohttp.ClientSession, fund_id: str, il_name_eng: str = "") -> float:
              print(f"🔍 [{fund_id}] {il_name_eng or 'Fund'}")
n              \n              # Playwright\n              result = await _try_playwright_bizportal(fund_id)\n              if result is not None:\n                  return result\n              \n              # Jina с retry\n              result = await _try_jina_with_retry(session, fund_id)\n              if result is not None:\n                  return result\n              \n              # Textise fallback\n              result = await _try_textise(session, fund_id)\n              if result is not None:\n                  return result\n              \n              print(f"   ❌ Все источники исчерпаны. Возвращаем 0.00%")\n              return 0.0

          async def fetch_all_israeli_funds(sectors_config: dict) -> dict:
n              results = {}\n              async with aiohttp.ClientSession() as session:\n                  tasks = []\n                  keys = []\n                  for key, cfg in sectors_config.items():\n                      fund_id = cfg.get("fund_id", "")\n                      il_name_eng = cfg.get("il_name_eng", "")\n                      keys.append(key)\n                      tasks.append(fetch_israeli_fund_data(session, fund_id, il_name_eng))\n                  \n                  fetched_changes = await asyncio.gather(*tasks)\n                  for key, val in zip(keys, fetched_changes):\n                      results[key] = {"price": 0.0, "change": val}\n              return results

          async def fetch_single_ticker(session: aiohttp.ClientSession, ticker: str) -> tuple:
n              api_ticker = f"^{ticker}" if ticker == "OVX" else ticker\n              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{api_ticker}?range=1d&interval=1m"\n              try:\n                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:\n                      if response.status == 200:\n                          data = await response.json()\n                          result = data.get("chart", {}).get("result", [])\n                          if result:\n                              meta = result[0].get("meta", {})\n                              price = meta.get("regularMarketPrice")\n                              prev_close = meta.get("chartPreviousClose")\n                              if price is not None and prev_close:\n                                  change = ((price - prev_close) / prev_close) * 100\n                                  return ticker, {"price": round(price, 2), "change": round(change, 2)}\n              except Exception:\n                  pass\n              return ticker, {"price": 0.0, "change": 0.0}

          async def fetch_all_yahoo_data(tickers: list) -> dict:
n              async with aiohttp.ClientSession() as session:\n                  tasks = [fetch_single_ticker(session, t) for t in tickers]\n                  results = await asyncio.gather(*tasks)\n                  return dict(results)
          EOF
          
          cat << 'EOF' > modules/news.py
          import aiohttp, urllib.parse, html
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def translate_to_russian(session: aiohttp.ClientSession, text: str) -> str:
n              if not text:\n                  return text\n              try:\n                  url = f"https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q={urllib.parse.quote(text)}"\n                  async with session.get(url, timeout=6) as resp:\n                      if resp.status == 200:\n                          data = await resp.json()\n                          translated = "".join([segment[0] for segment in data[0] if segment[0]])\n                          return html.unescape(translated)\n              except Exception as e:\n                  print(f"Ошибка перевода: {e}")\n              return text

          async def fetch_sector_news(session: aiohttp.ClientSession, query_ticker: str) -> list:
n              url = f"https://query1.finance.yahoo.com/v1/finance/search?q={query_ticker}"\n              try:\n                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:\n                      if response.status == 200:\n                          items = (await response.json()).get("news", [])\n                          for item in items:\n                              title = item.get("title", "")\n                              if title and len(title) > 15:\n                                  translated_title = await translate_to_russian(session, title)\n                                  return [f"• {translated_title}"]\n              except: pass\n              return ["• Торгуется в рамках текущей рыночной динамики."]

          async def fetch_ipo_news(session: aiohttp.ClientSession) -> list:
n              url = "https://query1.finance.yahoo.com/v1/finance/search?q=IPO"\n              ipo_news = []\n              try:\n                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:\n                      if response.status == 200:\n                          items = (await response.json()).get("news", [])\n                          for item in items[:5]:\n                              title = item.get("title", "")\n                              if title:\n                                  translated_title = await translate_to_russian(session, title)\n                                  ipo_news.append(f"📌 {translated_title}")\n              except: pass\n              return ipo_news or ["📌 Публикаций по IPO на этой неделе не зафиксировано."]
          EOF
          
          cat << 'EOF' > modules/formatter.py
          from datetime import datetime, timezone, timedelta
          from modules.config import BOT_NAME

          def escape_html(text: str) -> str:
n              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def build_telegram_message(sectors_data: list) -> str:
n              tz_il = timezone(timedelta(hours=3))\n              now_str = datetime.now(tz_il).strftime("%d.%m.%Y | %H:%M")\n              \n              lines = [\n                  "📈 <b>Рыночный Дайджест</b>",\n                  f"📅 {now_str} (IDT) 🇮🇱\\n",\n                  "<b>📊 ОБЗОР СЕКТОРОВ (US) И ФОНДОВ (IL)</b>",\n                  "<code>Сектор       US      IL   Рейтинг</code>",\n                  "<code>"\n              ]\n              \n              for s in sectors_data:\n                  icon = s['icon']\n                  name = s['short_eng'][:6]\n                  us_ch = s['avg_change']\n                  il_ch = s['il_fund_data']['change']\n                  \n                  us_str = f"+{us_ch:.1f}%" if us_ch > 0 else f"{us_ch:.1f}%"\n                  il_str = f"+{il_ch:.1f}%" if il_ch > 0 else f"{il_ch:.1f}%"\n                  \n                  score_emoji = "🟢" if s['score'] >= 65 else ("🟡" if s['score'] >= 40 else "🔴")\n                  lines.append(f"{icon}{name:<6} {us_str:>6} {il_str:>6}  {score_emoji}{s['score']:>3}/100")\n              lines.append("</code>\\n")

              lines.append("<blockquote expandable>")
n              lines.append("🔍 <b>ДРАЙВЕРЫ ДВИЖЕНИЯ И ПОКАЗАТЕЛИ СЕКТОРОВ</b>\\n")\n              for s in sectors_data:\n                  ch_sign = f"+{s['avg_change']:.2f}%" if s['avg_change'] > 0 else f"{s['avg_change']:.2f}%"\n                  lines.append(f"<b>{s['icon']} {escape_html(s['name'])}</b> ({ch_sign})")\n                  \n                  if s.get("top_3_tickers"):\n                      details_str = ", ".join([f"{t}: {c:+.2f}%" for t, c in s["top_3_tickers"]])\n                      lines.append(f"  📊 <i>Топ-3 драйвера: [{escape_html(details_str)}]</i>")\n                      \n                  for n in s['news']:\n                      lines.append(f"  {escape_html(n)}")\n                  lines.append("")\n              lines.append("</blockquote>\\n")

              ta_stocks_sorted = sorted(sectors_data, key=lambda x: x['il_fund_data']['change'])

              lines.append("<blockquote expandable>")
n              lines.append("🇮🇱 <b>TA Stocks (По возрастанию)</b>\\n")\n              for s in ta_stocks_sorted:\n                  il_ch = s['il_fund_data']['change']\n                  ch_emoji = "🟢" if il_ch > 0 else ("🔴" if il_ch < 0 else "⚪")\n                  ch_sign = f"+{il_ch:.2f}%" if il_ch > 0 else f"{il_ch:.2f}%"\n                  lines.append(f"{ch_emoji} <b>{escape_html(s['il_name_eng'])}</b> ({s['icon']})\\n└ <code>{s['fund_id']}</code> · <b>{ch_sign}</b>")\n              lines.append("</blockquote>")

              lines.append(f"\\n{BOT_NAME}")
n              return "\\n".join(lines)

          def build_ipo_message(ipo_news: list) -> str:
n              tz_il = timezone(timedelta(hours=3))\n              now_str = datetime.now(tz_il).strftime("%d.%m.%Y")\n              \n              lines = [\n                  "🔔 <b>ЕЖЕНЕДЕЛЬНЫЙ IPO ДАЙДЖЕСТ</b>",\n                  f"📅 {now_str} | Субботний обзор 🇮🇱\\n",\n                  "<blockquote expandable>"\n              ]\n              for news in ipo_news:\n                  lines.append(f"{escape_html(news)}\\n")\n              lines.append("</blockquote>")\n              lines.append(f"\\n{BOT_NAME}")\n              return "\\n".join(lines)
          EOF
          
          cat << 'EOF' > modules/telegram_sender.py
          import aiohttp
          from modules.config import BOT_TOKEN, CHAT_ID, HTTP_TIMEOUT

          def split_message(text: str, max_length: int = 4000) -> list[str]:
n              if len(text) <= max_length:\n                  return [text]\n              \n              chunks = []\n              raw_blocks = text.split("</blockquote>")\n              current_chunk = ""

              for raw_block in raw_blocks:
n                  if not raw_block:\n                      continue\n                  \n                  block = raw_block + "</blockquote>" if "blockquote" in raw_block else raw_block

                  if len(current_chunk) + len(block) > max_length:
n                      if current_chunk:\n                          chunks.append(current_chunk.strip())\n                          current_chunk = ""\n                      \n                      if len(block) > max_length:\n                          lines = block.split("\\n")\n                          for line in lines:\n                              if len(current_chunk) + len(line) + 1 > max_length:\n                                  chunks.append(current_chunk.strip())\n                                  current_chunk = line + "\\n"\n                              else:\n                                  current_chunk += line + "\\n"\n                      else:\n                          current_chunk = block\n                  else:\n                      current_chunk += block

              if current_chunk.strip():
n                  chunks.append(current_chunk.strip())

              return chunks

          async def send_to_telegram(text: str):
n              if not BOT_TOKEN or not CHAT_ID:\n                  print("❌ BOT_TOKEN или CHAT_ID не найдены")\n                  return

              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
n              chunks = split_message(text, max_length=3900)\n              \n              print(f"ℹ️ Общая длина сообщения: {len(text)} символов. Итоговых частей: {len(chunks)}")\n              \n              async with aiohttp.ClientSession() as session:\n                  for idx, chunk in enumerate(chunks, start=1):\n                      payload = {\n                          "chat_id": CHAT_ID, \n                          "text": chunk, \n                          "parse_mode": "HTML", \n                          "disable_web_page_preview": True\n                      }\n                      try:\n                          async with session.post(url, json=payload, timeout=HTTP_TIMEOUT) as resp:\n                              if resp.status == 200:\n                                  print(f"🚀 Часть [{idx}/{len(chunks)}] ({len(chunk)} симв.) успешно отправлена!")\n                              else:\n                                  print(f"❌ Ошибка Telegram (код {resp.status}): {await resp.text()}")\n                      except Exception as e:\n                          print(f"💥 Ошибка отправки: {e}")
          EOF
          
          cat << 'EOF' > main.py
          import asyncio, aiohttp
          from datetime import datetime, timezone, timedelta
          from modules.config import SECTORS_CONFIG
          from modules.market import fetch_all_yahoo_data, fetch_all_israeli_funds
          from modules.news import fetch_sector_news, fetch_ipo_news
          from modules.formatter import build_telegram_message, build_ipo_message
          from modules.telegram_sender import send_to_telegram

          def calculate_sector_score(avg_change: float) -> int:
n              return max(0, min(100, int(50 + (avg_change * 15.0))))

          async def run_market_analytics():
n              all_tickers = set()\n              for cfg in SECTORS_CONFIG.values():\n                  all_tickers.update(cfg["tickers"])\n              \n              print(f"📦 Сбор данных Yahoo Finance...")\n              global_market_data = await fetch_all_yahoo_data(list(all_tickers))

              print(f"🌐 Опрос израильских фондов...")\n              il_results = await fetch_all_israeli_funds(SECTORS_CONFIG)

              async with aiohttp.ClientSession() as session:\n                  sectors_results = []\n                  \n                  for key, cfg in SECTORS_CONFIG.items():\n                      ticker_details = [(t, global_market_data[t]["change"]) for t in cfg["tickers"] if t in global_market_data and global_market_data[t]["price"] > 0]\n                      \n                      sorted_tickers = sorted(ticker_details, key=lambda x: abs(x[1]), reverse=True)\n                      top_3_tickers = sorted_tickers[:3]\n                      \n                      valid_changes = [c for _, c in ticker_details]\n                      avg_change = sum(valid_changes) / len(valid_changes) if valid_changes else 0.0\n                      \n                      score = calculate_sector_score(avg_change)\n                      news = await fetch_sector_news(session, cfg["news_ticker"])\n                      \n                      sectors_results.append({\n                          "short_eng": cfg["short_eng"],\n                          "name": cfg["name"],\n                          "icon": cfg["icon"],\n                          "fund_id": cfg.get("fund_id", ""),\n                          "avg_change": round(avg_change, 2),\n                          "top_3_tickers": top_3_tickers,\n                          "score": score,\n                          "news": news,\n                          "il_name_eng": cfg["il_name_eng"],\n                          "il_fund_data": il_results.get(key, {"price": 0.0, "change": 0.0})\n                      })\n                  \n                  sectors_results.sort(key=lambda x: x["avg_change"], reverse=True)\n                      \n                  message = build_telegram_message(sectors_results)\n                  await send_to_telegram(message)

          async def run_ipo_digest():
n              async with aiohttp.ClientSession() as session:\n                  ipo_news = await fetch_ipo_news(session)\n                  message = build_ipo_message(ipo_news)\n                  await send_to_telegram(message)

          async def main():
n              tz_il = timezone(timedelta(hours=3))\n              weekday = datetime.now(tz_il).weekday()\n              \n              if weekday == 5:\n                  await run_ipo_digest()\n              else:\n                  await run_market_analytics()

          if __name__ == "__main__":
n              asyncio.run(main())
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
