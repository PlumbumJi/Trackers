              "5132642": "https://www.funder.co.il/fund/5132642",
              "5138136": "https://www.funder.co.il/fund/5138136",
              "5129481": "https://www.funder.co.il/fund/5129481",
              "5125828": "https://www.funder.co.il/fund/5125828",
              "5132535": "https://www.funder.co.il/fund/5132535",
              "5136015": "https://www.funder.co.il/fund/5136015",
              "5131420": "https://www.funder.co.il/fund/5131420",
              "5132170": "https://www.funder.co.il/fund/5132170"
          }

          SECTORS_CONFIG = {
              "Oil": {
                  "name": "Нефть и Энергия", "icon": "🛢️", "news_ticker": "USO", "il_fund": "5141841", 
                  "il_name_eng": "WTI Ultra x3",
                  "tickers": ["BZ=F", "CL=F", "USO", "OVX"]
              },
              "AI": {
                  "name": "Искусственный Интеллект", "icon": "🤖", "news_ticker": "NVDA", "il_fund": "5140744", 
                  "il_name_eng": "Migdal AI",
                  "tickers": ["NVDA", "MSFT", "AMD", "AVGO", "PLTR", "GOOGL", "AMZN", "TSM", "BOTZ", "AIQ", "ROBO", "IRBO"]
              },
              "Gaming": {
                  "name": "Игровая Индустрия", "icon": "🎮", "news_ticker": "SONY", "il_fund": "5128624", 
                  "il_name_eng": "MTF Bluestar E-Games",
                  "tickers": ["NVDA", "MSFT", "TTWO", "EA", "RBLX", "SONY", "NTDOY", "UBSFY", "ESPO", "HERO", "GAMR"]
              },
              "Semiconductors": {
                  "name": "Полупроводники", "icon": "💻", "news_ticker": "NVDA", "il_fund": "5135355", 
                  "il_name_eng": "Kasam Semiconductors",
                  "tickers": ["NVDA", "AMD", "AVGO", "QCOM", "TSM", "ASML", "INTC", "SOXX", "SMH"]
              },
              "Banking": {
                  "name": "Банковский сектор", "icon": "🏦", "news_ticker": "JPM", "il_fund": "5132337", 
                  "il_name_eng": "Meitav Banks US",
                  "tickers": ["JPM", "BAC", "GS", "MS", "WFC", "XLF", "KBE"]
              },
              "Biotech": {
                  "name": "Биотех и Медицина", "icon": "🏥", "news_ticker": "LLY", "il_fund": "5122585", 
                  "il_name_eng": "Harel Nasdaq Biotech",
                  "tickers": ["LLY", "NVO", "PFE", "MRNA", "AMGN", "XBI", "IBB"]
              },
              "Clean Energy": {
                  "name": "Зеленая энергетика", "icon": "☀️", "news_ticker": "FSLR", "il_fund": "5132642", 
                  "il_name_eng": "Meitav Clean Energy",
                  "tickers": ["ICLN", "TAN", "FAN", "FSLR", "ENPH"]
              },
              "Uranium": {
                  "name": "Уран и Атомная энергетика", "icon": "☢️", "news_ticker": "CCJ", "il_fund": "5138136", 
                  "il_name_eng": "More Uranium Giants",
                  "tickers": ["URA", "URNM", "CCJ", "NXE"]
              },
              "Gold": {
                  "name": "Золото и Металлы", "icon": "🥇", "news_ticker": "GLD", "il_fund": "5129481", 
                  "il_name_eng": "Tachlit Gold Spot",
                  "tickers": ["GLD", "GDX", "SLV"]
              },
              "Cybersecurity": {
                  "name": "Кибербезопасность", "icon": "🛡️", "news_ticker": "CRWD", "il_fund": "5125828", 
                  "il_name_eng": "IBI Cybersecurity",
