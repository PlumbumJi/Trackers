name: Automated Market Analytics

on:
  schedule:
    - cron: '10 20 * * 1-5'
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
