          cat << 'EOF' > modules/market.py
          import aiohttp
          import asyncio
          import re
          from bs4 import BeautifulSoup
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def fetch_single_ticker(session: aiohttp.ClientSession, ticker: str) -> tuple:
              api_ticker = f"^{ticker}" if ticker == "OVX" else ticker
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{api_ticker}?range=1d&interval=1m"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          data = await response.json()
                          result = data.get("chart", {}).get("result", [])
                          if result:
                              meta = result[0].get("meta", {})
                              price = meta.get("regularMarketPrice")
                              prev_close = meta.get("chartPreviousClose")
                              if price is not None and prev_close:
                                  change = ((price - prev_close) / prev_close) * 100
                                  return ticker, {"price": round(price, 2), "change": round(change, 2)}
              except Exception as e:
                  print(f"Ошибка тикера {ticker}: {e}")
              return ticker, {"price": 0.0, "change": 0.0}

          async def fetch_all_yahoo_data(tickers: list) -> dict:
              async with aiohttp.ClientSession() as session:
                  tasks = [fetch_single_ticker(session, t) for t in tickers]
                  results = await asyncio.gather(*tasks)
                  return dict(results)

          def parse_funder_indicator(html_text: str, fund_id: str) -> float:
              """Специализированная функция поиска показателя יומית на сайте Funder."""
              if not html_text:
                  return 0.0
              
              soup = BeautifulSoup(html_text, 'html.parser')
              
              # 1. Поиск по тегам <script> (на случай SSR/JS структур)
              for script in soup.find_all('script'):
                  if script.string and ('יומית' in script.string or fund_id in script.string):
                      match = re.search(r'"yomi"?:?\s*"?([-+]?\d+\.?\d*)"?', script.string, re.IGNORECASE)
                      if match:
                          try:
                              return float(match.group(1))
                          except ValueError:
                              pass

              # 2. Поиск по DOM элементов, содержащих маркер 'יומית'
              elements = soup.find_all(string=re.compile(r'יומית'))
              for el in elements:
                  parent = el.find_parent(['td', 'tr', 'div', 'li'])
                  if not parent:
                      continue
                  
                  text_block = parent.get_text(separator=' ')
                  if parent.parent:
                      text_block += " " + parent.parent.get_text(separator=' ')
                  
                  matches = re.findall(r'([-+]?\s*\d+(?:\.\d+)?)\s*%', text_block)
                  if matches:
                      clean_num = matches[0].replace(" ", "").replace("+", "")
                      try:
                          return float(clean_num)
                      except ValueError:
                          pass

              # 3. Глобальный поиск регулярным выражением по всему HTML
              raw_matches = re.findall(r'יומית[^\d%\+\-]*?([-+]?\s*\d+(?:\.\d+)?)\s*%', html_text)
              if raw_matches:
                  clean_num = raw_matches[0].replace(" ", "").replace("+", "")
                  try:
                      return float(clean_num)
                  except ValueError:
                      pass

              return 0.0

          async def fetch_israeli_fund(session: aiohttp.ClientSession, fund_id: str) -> dict:
              url = f"https://www.funder.co.il/fund/{fund_id}"
              funder_headers = HEADERS.copy()
              funder_headers.update({
                  "Referer": "https://www.funder.co.il/",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
              })

              try:
                  async with session.get(url, headers=funder_headers, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          html_text = await response.text()
                          change_val = parse_funder_indicator(html_text, fund_id)
                          print(f"📊 Funder [{fund_id}]: יומית = {change_val}%")
                          return {"price": 0.0, "change": round(change_val, 2)}
              except Exception as e:
                  print(f"Ошибка парсинга Funder ({fund_id}): {e}")
                  
              return {"price": 0.0, "change": 0.0}
          EOF
          
          cat << 'EOF' > modules/news.py
          import aiohttp, urllib.parse, html, re
          from modules.config import HTTP_TIMEOUT, MAX_NEWS_PER_SECTOR, HEADERS

          SPAM_PATTERNS = [
              r"if you invested", r"would you have now", r"stocks to buy",
              r"should you buy", r"social security", r"check in 202",
              r"is it a buy", r"top \d+", r"better buy", r"where will.*be in",
              r"millionaire", r"prediction", r"bull vs bear"
          ]

          def is_quality_headline(title: str) -> bool:
              for pattern in SPAM_PATTERNS:
                  if re.search(pattern, title, re.IGNORECASE):
                      return False
              return True

          def clean_headline(text: str) -> str:
              text = re.sub(r'\s*[:—-]\s*(Yahoo Finance|Reuters|Bloomberg|CNBC|Motley Fool|MarketWatch|MT Newswires|Zacks|Barrons\.com|24/7 Wall St\.).*$', '', text, flags=re.IGNORECASE)
              text = text.strip()
              if not text.endswith('.'): text += '.'
              if len(text) > 120:
                  text = text[:117] + "..."
              return text

          async def translate_text(session: aiohttp.ClientSession, text: str) -> str:
              try:
                  url = f"https://api.mymemory.translated.net/get?q={urllib.parse.quote(text)}&langpair=en|ru"
                  async with session.get(url, timeout=5) as resp:
                      if resp.status == 200:
                          translated = (await resp.json()).get("responseData", {}).get("translatedText", text)
                          return html.unescape(translated)
              except: pass
              return text

          async def fetch_sector_news(session: aiohttp.ClientSession, query_ticker: str) -> list:
              url = f"https://query1.finance.yahoo.com/v1/finance/search?q={query_ticker}"
              news_list = []
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items:
                              title = item.get("title", "")
                              if title and is_quality_headline(title):
                                  cleaned = clean_headline(title)
                                  translated = await translate_text(session, cleaned)
                                  news_list.append(f"• {translated}")
                                  if len(news_list) >= MAX_NEWS_PER_SECTOR:
                                      break
              except: pass
              return news_list or ["• Торгуется в рамках текущей рыночной динамики."]

          async def fetch_ipo_news(session: aiohttp.ClientSession) -> list:
              url = "https://query1.finance.yahoo.com/v1/finance/search?q=IPO"
              ipo_news = []
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items[:6]:
                              title = item.get("title", "")
                              if title and is_quality_headline(title):
                                  cleaned = clean_headline(title)
                                  translated = await translate_text(session, cleaned)
                                  ipo_news.append(f"📌 {translated}")
              except: pass
              return ipo_news or ["📌 На этой неделе крупных публикаций по IPO не зафиксировано."]
          EOF
          
          cat << 'EOF' > modules/formatter.py
          from datetime import datetime, timezone, timedelta
          from modules.config import BOT_NAME

          def escape_html(text: str) -> str:
              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def get_market_status() -> str:
              tz_il = timezone(timedelta(hours=3))
              now = datetime.now(tz_il)
              weekday = now.weekday()
              
              if weekday in (4, 5): 
                  return "⚠️ <i>Рынки Израиля закрыты (Выходные).</i>"
              return "🟢 <i>Активный рабочий день (TASE / US Markets)</i>"

          def build_telegram_message(sectors_data: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y | %H:%M")
              status_line = get_market_status()
              
              gainers = [s for s in sectors_data if s['avg_change'] >= 0]
              losers = [s for s in sectors_data if s['avg_change'] < 0]
              
              gainers.sort(key=lambda x: x['avg_change'], reverse=True)
              losers.sort(key=lambda x: x['avg_change'])

              lines = [
                  "📈 <b>РЫНОЧНЫЙ ДАЙДЖЕСТ И АНАЛИТИКА</b>",
                  f"📅 {now_str} (IDT) 🇮🇱\n",
                  f"{status_line}\n",
                  "<b>📊 ОБЗОР СЕКТОРОВ (US)</b>",
                  "<code>Сектор       US      IL   Рейтинг</code>",
                  "<code>---------------------------------</code>",
                  "<code>"
              ]
              
              all_sorted = gainers + losers
              for s in all_sorted:
                  icon = s['icon']
                  name = s['short_eng'][:6]
                  us_ch = s['avg_change']
                  il_ch = s['il_fund_data']['change']
                  
                  us_str = f"+{us_ch:.1f}%" if us_ch > 0 else f"{us_ch:.1f}%"
                  il_str = f"+{il_ch:.1f}%" if il_ch > 0 else f"{il_ch:.1f}%"
                  
                  score_emoji = "🟢" if s['score'] >= 65 else ("🟡" if s['score'] >= 40 else "🔴")
                  lines.append(f"{icon}{name:<6} {us_str:>6} {il_str:>6}  {score_emoji}{s['score']:>3}/100")
              lines.append("</code>\n")

              lines.append("<blockquote expandable>")
              lines.append("🔍 <b>ДЕТАЛИЗАЦИЯ И ДРАЙВЕРЫ ДВИЖЕНИЯ</b>\n")
              
              if gainers:
                  lines.append("🟢 <b>СЕКТОРЫ В ПЛЮСЕ</b>")
                  for s in gainers:
                      ch_sign = f"+{s['avg_change']:.2f}%"
                      lines.append(f"<b>{s['icon']} {s['name']}</b> ({ch_sign})")
                      if s.get('top_movers'):
                          movers = [f"{'📈' if c >= 0 else '📉'}{t}({'+' if c>0 else ''}{c:.2f}%)" for t, c in s['top_movers']]
                          lines.append("  " + "  ".join(movers))
                      for n in s['news']:
                          lines.append(f"  {escape_html(n)}")
                      lines.append("")

              if losers:
                  lines.append("🔴 <b>СЕКТОРЫ В МИНУСЕ</b>")
                  for s in losers:
                      ch_sign = f"{s['avg_change']:.2f}%"
                      lines.append(f"<b>{s['icon']} {s['name']}</b> ({ch_sign})")
                      if s.get('top_movers'):
                          movers = [f"{'📈' if c >= 0 else '📉'}{t}({'+' if c>0 else ''}{c:.2f}%)" for t, c in s['top_movers']]
                          lines.append("  " + "  ".join(movers))
                      for n in s['news']:
                          lines.append(f"  {escape_html(n)}")
                      lines.append("")
              lines.append("</blockquote>")

              lines.append("\n🇮🇱 <b>ФОНДЫ ТЕЛЬ-АВИВА (НА КОНЕЦ ПОСЛЕДНИХ ТОРГОВ)</b>")
              lines.append("<code>---------------------------------</code>")
              for s in all_sorted:
                  il_ch = s['il_fund_data']['change']
                  ch_emoji = "🟢" if il_ch > 0 else ("🔴" if il_ch < 0 else "⚪")
                  ch_sign = f"+{il_ch:.2f}%" if il_ch > 0 else f"{il_ch:.2f}%"
                  lines.append(f"{ch_emoji} <code>{s['icon']} {s['il_name_eng']:<20} | {ch_sign:>7}</code>")

              lines.append("\n⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡️\n")
              lines.append(BOT_NAME)
              return "\n".join(lines)

          def build_ipo_message(ipo_news: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y")
              
              lines = [
                  "🔔 <b>ЕЖЕНЕДЕЛЬНЫЙ IPO ДАЙДЖЕСТ</b>",
                  f"📅 {now_str} | Субботний обзор 🇮🇱\n",
                  "<b>🚀 КЛЮЧЕВЫЕ СОБЫТИЯ И АНОНСЫ IPO:</b>",
                  "<code>---------------------------------</code>"
              ]
              
              lines.append("<blockquote expandable>")
              for news in ipo_news:
                  lines.append(f"{escape_html(news)}\n")
              lines.append("</blockquote>")
              
              lines.append("\n💡 <i>Примечание: Данные формируются по итогам торгов прошлых дней и анонсам проспектов эмиссий на будущую неделю.</i>")
              lines.append("\n⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡️\n")
              lines.append(BOT_NAME)
              return "\n".join(lines)
          EOF
          
          cat << 'EOF' > modules/telegram_sender.py
          import aiohttp
          from modules.config import BOT_TOKEN, CHAT_ID, HTTP_TIMEOUT
          
          async def send_to_telegram(text: str):
              if not BOT_TOKEN or not CHAT_ID:
                  print("❌ Ошибка: Не установлены BOT_TOKEN или CHAT_ID")
                  return
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              payload = {
                  "chat_id": CHAT_ID,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True
              }
              async with aiohttp.ClientSession() as session:
                  try:
                      async with session.post(url, json=payload, timeout=HTTP_TIMEOUT) as resp:
                          resp_text = await resp.text()
                          if resp.status == 200:
                              print("🚀 Сообщение успешно отправлено в Telegram!")
                          else:
                              print(f"❌ Ошибка Telegram API (Статус {resp.status}): {resp_text}")
                  except Exception as e: 
                      print(f"💥 Сетевая ошибка при отправке: {e}")
          EOF
          
          cat << 'EOF' > main.py
          import asyncio, aiohttp
          from datetime import datetime, timezone, timedelta
          from modules.config import SECTORS_CONFIG
          from modules.market import fetch_all_yahoo_data, fetch_israeli_fund
          from modules.news import fetch_sector_news, fetch_ipo_news
          from modules.formatter import build_telegram_message, build_ipo_message
          from modules.telegram_sender import send_to_telegram

          def calculate_sector_score(avg_change: float) -> int:
              base_score = 50
              score = int(base_score + (avg_change * 15.0))
              return max(0, min(100, score))

          async def run_market_analytics():
              all_tickers = set()
              for cfg in SECTORS_CONFIG.values():
                  all_tickers.update(cfg["tickers"])
              
              print(f"📦 Сбор данных по {len(all_tickers)} тикерам...")
              global_market_data = await fetch_all_yahoo_data(list(all_tickers))
              
              async with aiohttp.ClientSession() as session:
                  sectors_results = []
                  il_tasks = {key: fetch_israeli_fund(session, cfg["il_fund"]) for key, cfg in SECTORS_CONFIG.items() if cfg["il_fund"]}
                  
                  il_results = {}
                  if il_tasks:
                      il_keys = list(il_tasks.keys())
                      il_res_data = await asyncio.gather(*il_tasks.values())
                      il_results = dict(zip(il_keys, il_res_data))
                  
                  for key, cfg in SECTORS_CONFIG.items():
                      valid_changes = []
                      ticker_movers = []
                      
                      for t in cfg["tickers"]:
                          if t in global_market_data and global_market_data[t]["price"] > 0:
                              ch_val = global_market_data[t]["change"]
                              valid_changes.append(ch_val)
                              ticker_movers.append((t, ch_val))
                      
                      avg_change = sum(valid_changes) / len(valid_changes) if valid_changes else 0.0
                      score = calculate_sector_score(avg_change)
                      news = await fetch_sector_news(session, cfg["news_ticker"])
                      
                      top_movers = []
                      if ticker_movers:
                          sorted_movers = sorted(ticker_movers, key=lambda x: x[1], reverse=True)
                          top_movers.append(sorted_movers[0]) 
                          if len(sorted_movers) > 1:
                              top_movers.append(sorted_movers[-1])
                      
                      sectors_results.append({
                          "name_eng": key,
                          "short_eng": cfg["short_eng"],
                          "name": cfg["name"],
                          "icon": cfg["icon"],
                          "avg_change": round(avg_change, 2),
                          "score": score,
                          "top_movers": top_movers,
                          "news": news,
                          "il_id": cfg["il_fund"],
                          "il_name_eng": cfg["il_name_eng"],
                          "il_fund_data": il_results.get(key, {"price": 0.0, "change": 0.0})
                      })
                      
                  message = build_telegram_message(sectors_results)
                  await send_to_telegram(message)

          async def run_ipo_digest():
              print("📅 Формирование субботнего IPO дайджеста...")
              async with aiohttp.ClientSession() as session:
                  ipo_news = await fetch_ipo_news(session)
                  message = build_ipo_message(ipo_news)
                  await send_to_telegram(message)

          async def main():
              tz_il = timezone(timedelta(hours=3))
              weekday = datetime.now(tz_il).weekday()
              
              if weekday == 5: # Суббота
                  await run_ipo_digest()
              else:
                  await run_market_analytics()

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
