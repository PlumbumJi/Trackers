          cat << 'EOF' > modules/market.py
          import aiohttp
          import asyncio
          import re
          import random
          from modules.config import HTTP_TIMEOUT, HEADERS

          # Playwright для обхода Cloudflare
          _playwright_available = False
          try:
              from playwright.async_api import async_playwright
              _playwright_available = True
          except ImportError:
              pass

          def parse_float(val) -> float | None:
              if val is None:
                  return None
              try:
                  cleaned = str(val).replace(',', '.').replace('%', '').replace('+', '').strip()
                  match = re.search(r'([+-]?\d+(?:\.\d+)?)', cleaned)
                  if match:
                      res = float(match.group(1))
                      if -25.0 <= res <= 25.0:
                          return round(res, 2)
              except Exception:
                  pass
              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 1 — Playwright (обход Cloudflare)
          # ═════════════════════════════════════════════════════════════════════

          async def _try_playwright_bizportal(fund_id: str) -> float | None:
              """
              Используем Playwright (headless Chromium) для обхода Cloudflare.
              Это реальный браузер — Cloudflare его пропускает.
              """
              if not _playwright_available:
                  return None
              
              url = f"https://www.bizportal.co.il/mutualfunds/quote/generalview/{fund_id}"
              
              try:
                  async with async_playwright() as p:
                      browser = await p.chromium.launch(headless=True)
                      context = await browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                          locale="he-IL",
                          timezone_id="Asia/Jerusalem",
                      )
                      page = await context.new_page()
                      
                      # Переходим на страницу и ждём загрузки
                      await page.goto(url, wait_until="networkidle", timeout=30000)
                      
                      # Ждём, пока загрузится контент (максимум 10 сек)
                      await asyncio.sleep(3)
                      
                      # Получаем HTML
                      html = await page.content()
                      await browser.close()
                      
                      # Парсим HTML
                      # Ищем: מחיר קנייה -> число -> процент
                      patterns = [
                          r'מחיר\s*קנייה\s*</td>\s*<td[^>]*>\s*(\d+\.?\d*)\s*</td>\s*<td[^>]*>\s*([+-]?\d+\.?\d*)%',
                          r'>([+-]?\d+\.?\d*)%<',
                          r'"DailyChangePercent"[:\s]*"?([+-]?\d+\.?\d*)"?',
                          r'"ChangePercent"[:\s]*"?([+-]?\d+\.?\d*)"?',
                          r'class="[^"]*change[^"]*">\s*([+-]?\d+\.?\d*)\s*%',
                      ]
                      
                      for pattern in patterns:
                          match = re.search(pattern, html, re.IGNORECASE | re.DOTALL)
                          if match:
                              # Для первого паттерна процент во второй группе
                              val_str = match.group(2) if len(match.groups()) > 1 and match.group(2) else match.group(1)
                              val = parse_float(val_str)
                              if val is not None:
                                  print(f"   ✅ Playwright: {val}%")
                                  return val
                      
                      # Fallback: ищем цену и базовую цену
                      last_match = re.search(r'"LastRate"[:\s]*(\d+\.?\d*)', html, re.IGNORECASE)
                      base_match = re.search(r'"BaseRate"[:\s]*(\d+\.?\d*)', html, re.IGNORECASE)
                      if last_match and base_match:
                          last = float(last_match.group(1))
                          base = float(base_match.group(1))
                          if base > 0:
                              val = round(((last - base) / base) * 100, 2)
                              print(f"   ✅ Playwright (calc): {val}%")
                              return val
                              
              except Exception as e:
                  print(f"   💥 Playwright ошибка: {str(e)[:80]}")
              
              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 2 — Playwright + Funder
          # ═════════════════════════════════════════════════════════════════════

          async def _try_playwright_funder(fund_id: str) -> float | None:
              """
              Playwright для Funder.
              """
              if not _playwright_available:
                  return None
              
              url = f"https://www.funder.co.il/fund/{fund_id}"
              
              try:
                  async with async_playwright() as p:
                      browser = await p.chromium.launch(headless=True)
                      context = await browser.new_context(
                          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                          locale="he-IL",
                      )
                      page = await context.new_page()
                      await page.goto(url, wait_until="networkidle", timeout=30000)
                      await asyncio.sleep(2)
                      
                      html = await page.content()
                      await browser.close()
                      
                      patterns = [
                          r'"dayChange"[:\s]*([+-]?\d+\.?\d*)',
                          r'"change"[:\s]*"?([+-]?\d+\.?\d*)"?',
                          r'>([+-]?\d+\.?\d*)%<',
                      ]
                      
                      for pattern in patterns:
                          match = re.search(pattern, html, re.IGNORECASE | re.DOTALL)
                          if match:
                              val = parse_float(match.group(1))
                              if val is not None:
                                  print(f"   ✅ Playwright+Funder: {val}%")
                                  return val
                              
              except Exception as e:
                  print(f"   💥 Playwright+Funder ошибка: {str(e)[:80]}")
              
              return None

          # ═════════════════════════════════════════════════════════════════════
          # УРОВЕНЬ 3 — r.jina.ai (fallback)
          # ═════════════════════════════════════════════════════════════════════

          async def _try_jina_bizportal(session: aiohttp.ClientSession, fund_id: str) -> float | None:
              url = f"https://r.jina.ai/http://www.bizportal.co.il/mutualfunds/quote/generalview/{fund_id}"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "text/plain,*/*",
              }
              
              try:
                  async with session.get(url, headers=headers, timeout=35) as resp:
                      if resp.status == 200:
                          text = await resp.text()
                          
                          # Ищем: מחיר קנייה -> число -> процент
                          patterns = [
                              r'מחיר\s*קנייה\s*\n?\s*\d+\.?\d*\s*\n?\s*([+-]?\d+\.?\d*)%',
                              r'>([+-]?\d+\.?\d*)%<',
                          ]
                          
                          for pattern in patterns:
                              match = re.search(pattern, text, re.MULTILINE)
                              if match:
                                  val = parse_float(match.group(1))
                                  if val is not None:
                                      print(f"   ✅ Jina: {val}%")
                                      return val
              except Exception as e:
                  print(f"   💥 Jina ошибка: {str(e)[:60]}")
              
              return None

          # ═════════════════════════════════════════════════════════════════════
          # ГЛАВНАЯ ФУНКЦИЯ
          # ═════════════════════════════════════════════════════════════════════

          async def fetch_israeli_fund_data(session: aiohttp.ClientSession, fund_id: str, il_name_eng: str = "") -> float:
              print(f"🔍 [{fund_id}] {il_name_eng or 'Fund'}")
              
              # Пробуем Playwright первым (обходит Cloudflare)
              print(f"   → Пробуем Playwright (Bizportal)...")
              result = await _try_playwright_bizportal(fund_id)
              if result is not None:
                  return result
              
              print(f"   → Пробуем Playwright (Funder)...")
              result = await _try_playwright_funder(fund_id)
              if result is not None:
                  return result
              
              # Fallback: Jina
              print(f"   → Пробуем Jina...")
              result = await _try_jina_bizportal(session, fund_id)
              if result is not None:
                  return result
              
              print(f"   ❌ Все источники исчерпаны. Возвращаем 0.00%")
              return 0.0

          async def fetch_all_israeli_funds(sectors_config: dict) -> dict:
              results = {}
              async with aiohttp.ClientSession() as session:
                  tasks = []
                  keys = []
                  for key, cfg in sectors_config.items():
                      fund_id = cfg.get("fund_id", "")
                      il_name_eng = cfg.get("il_name_eng", "")
                      keys.append(key)
                      tasks.append(fetch_israeli_fund_data(session, fund_id, il_name_eng))
                  
                  fetched_changes = await asyncio.gather(*tasks)
                  for key, val in zip(keys, fetched_changes):
                      results[key] = {"price": 0.0, "change": val}
              return results

          async def fetch_single_ticker(session: aiohttp.ClientSession, ticker: str) -> tuple:
              api_ticker = f"^{ticker}" if ticker == "OVX" else ticker
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{api_ticker}?range=1d&interval=1m"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          data = await response.json()
                          result = data.get("chart", {}).get("result", [])
                          if result:
                              meta = result[0].get("meta", {})
                              price = meta.get("regularMarketPrice")
                              prev_close = meta.get("chartPreviousClose")
                              if price is not None and prev_close:
                                  change = ((price - prev_close) / prev_close) * 100
                                  return ticker, {"price": round(price, 2), "change": round(change, 2)}
              except Exception:
                  pass
              return ticker, {"price": 0.0, "change": 0.0}

          async def fetch_all_yahoo_data(tickers: list) -> dict:
              async with aiohttp.ClientSession() as session:
                  tasks = [fetch_single_ticker(session, t) for t in tickers]
                  results = await asyncio.gather(*tasks)
                  return dict(results)
          EOF
          
          cat << 'EOF' > modules/news.py
          import aiohttp, urllib.parse, html
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def translate_to_russian(session: aiohttp.ClientSession, text: str) -> str:
              if not text:
                  return text
              try:
                  url = f"https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q={urllib.parse.quote(text)}"
                  async with session.get(url, timeout=6) as resp:
                      if resp.status == 200:
                          data = await resp.json()
                          translated = "".join([segment[0] for segment in data[0] if segment[0]])
                          return html.unescape(translated)
              except Exception as e:
                  print(f"Ошибка перевода: {e}")
              return text

          async def fetch_sector_news(session: aiohttp.ClientSession, query_ticker: str) -> list:
              url = f"https://query1.finance.yahoo.com/v1/finance/search?q={query_ticker}"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items:
                              title = item.get("title", "")
                              if title and len(title) > 15:
                                  translated_title = await translate_to_russian(session, title)
                                  return [f"• {translated_title}"]
              except: pass
              return ["• Торгуется в рамках текущей рыночной динамики."]

          async def fetch_ipo_news(session: aiohttp.ClientSession) -> list:
              url = "https://query1.finance.yahoo.com/v1/finance/search?q=IPO"
              ipo_news = []
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          items = (await response.json()).get("news", [])
                          for item in items[:5]:
                              title = item.get("title", "")
                              if title:
                                  translated_title = await translate_to_russian(session, title)
                                  ipo_news.append(f"📌 {translated_title}")
              except: pass
              return ipo_news or ["📌 Публикаций по IPO на этой неделе не зафиксировано."]
          EOF
          
          cat << 'EOF' > modules/formatter.py
          from datetime import datetime, timezone, timedelta
          from modules.config import BOT_NAME

          def escape_html(text: str) -> str:
              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def build_telegram_message(sectors_data: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y | %H:%M")
              
              lines = [
                  "📈 <b>Рыночный Дайджест</b>",
                  f"📅 {now_str} (IDT) 🇮🇱\n",
                  "<b>📊 ОБЗОР СЕКТОРОВ (US) И ФОНДОВ (IL)</b>",
                  "<code>Сектор       US      IL   Рейтинг</code>",
                  "<code>"
              ]
              
              for s in sectors_data:
                  icon = s['icon']
                  name = s['short_eng'][:6]
                  us_ch = s['avg_change']
                  il_ch = s['il_fund_data']['change']
                  
                  us_str = f"+{us_ch:.1f}%" if us_ch > 0 else f"{us_ch:.1f}%"
                  il_str = f"+{il_ch:.1f}%" if il_ch > 0 else f"{il_ch:.1f}%"
                  
                  score_emoji = "🟢" if s['score'] >= 65 else ("🟡" if s['score'] >= 40 else "🔴")
                  lines.append(f"{icon}{name:<6} {us_str:>6} {il_str:>6}  {score_emoji}{s['score']:>3}/100")
              lines.append("</code>\n")

              lines.append("<blockquote expandable>")
              lines.append("🔍 <b>ДРАЙВЕРЫ ДВИЖЕНИЯ И ПОКАЗАТЕЛИ СЕКТОРОВ</b>\n")
              for s in sectors_data:
                  ch_sign = f"+{s['avg_change']:.2f}%" if s['avg_change'] > 0 else f"{s['avg_change']:.2f}%"
                  lines.append(f"<b>{s['icon']} {escape_html(s['name'])}</b> ({ch_sign})")
                  
                  if s.get("top_3_tickers"):
                      details_str = ", ".join([f"{t}: {c:+.2f}%" for t, c in s["top_3_tickers"]])
                      lines.append(f"  📊 <i>Топ-3 драйвера: [{escape_html(details_str)}]</i>")
                      
                  for n in s['news']:
                      lines.append(f"  {escape_html(n)}")
                  lines.append("")
              lines.append("</blockquote>\n")

              ta_stocks_sorted = sorted(sectors_data, key=lambda x: x['il_fund_data']['change'])

              lines.append("<blockquote expandable>")
              lines.append("🇮🇱 <b>TA Stocks (По возрастанию)</b>\n")
              for s in ta_stocks_sorted:
                  il_ch = s['il_fund_data']['change']
                  ch_emoji = "🟢" if il_ch > 0 else ("🔴" if il_ch < 0 else "⚪")
                  ch_sign = f"+{il_ch:.2f}%" if il_ch > 0 else f"{il_ch:.2f}%"
                  lines.append(f"{ch_emoji} <b>{escape_html(s['il_name_eng'])}</b> ({s['icon']})\n└ <code>{s['fund_id']}</code> · <b>{ch_sign}</b>")
              lines.append("</blockquote>")

              lines.append(f"\n{BOT_NAME}")
              return "\n".join(lines)

          def build_ipo_message(ipo_news: list) -> str:
              tz_il = timezone(timedelta(hours=3))
              now_str = datetime.now(tz_il).strftime("%d.%m.%Y")
              
              lines = [
                  "🔔 <b>ЕЖЕНЕДЕЛЬНЫЙ IPO ДАЙДЖЕСТ</b>",
                  f"📅 {now_str} | Субботний обзор 🇮🇱\n",
                  "<blockquote expandable>"
              ]
              for news in ipo_news:
                  lines.append(f"{escape_html(news)}\n")
              lines.append("</blockquote>")
              lines.append(f"\n{BOT_NAME}")
              return "\n".join(lines)
          EOF
          
          cat << 'EOF' > modules/telegram_sender.py
          import aiohttp
          from modules.config import BOT_TOKEN, CHAT_ID, HTTP_TIMEOUT

          def split_message(text: str, max_length: int = 4000) -> list[str]:
              if len(text) <= max_length:
                  return [text]
              
              chunks = []
              raw_blocks = text.split("</blockquote>")
              current_chunk = ""

              for raw_block in raw_blocks:
                  if not raw_block:
                      continue
                  
                  block = raw_block + "</blockquote>" if "blockquote" in raw_block else raw_block

                  if len(current_chunk) + len(block) > max_length:
                      if current_chunk:
                          chunks.append(current_chunk.strip())
                          current_chunk = ""
                      
                      if len(block) > max_length:
                          lines = block.split("\n")
                          for line in lines:
                              if len(current_chunk) + len(line) + 1 > max_length:
                                  chunks.append(current_chunk.strip())
                                  current_chunk = line + "\n"
                              else:
                                  current_chunk += line + "\n"
                      else:
                          current_chunk = block
                  else:
                      current_chunk += block

              if current_chunk.strip():
                  chunks.append(current_chunk.strip())

              return chunks

          async def send_to_telegram(text: str):
              if not BOT_TOKEN or not CHAT_ID:
                  print("❌ BOT_TOKEN или CHAT_ID не найдены")
                  return

              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              chunks = split_message(text, max_length=3900)
              
              print(f"ℹ️ Общая длина сообщения: {len(text)} символов. Итоговых частей: {len(chunks)}")
              
              async with aiohttp.ClientSession() as session:
                  for idx, chunk in enumerate(chunks, start=1):
                      payload = {
                          "chat_id": CHAT_ID, 
                          "text": chunk, 
                          "parse_mode": "HTML", 
                          "disable_web_page_preview": True
                      }
                      try:
                          async with session.post(url, json=payload, timeout=HTTP_TIMEOUT) as resp:
                              if resp.status == 200:
                                  print(f"🚀 Часть [{idx}/{len(chunks)}] ({len(chunk)} симв.) успешно отправлена!")
                              else:
                                  print(f"❌ Ошибка Telegram (код {resp.status}): {await resp.text()}")
                      except Exception as e:
                          print(f"💥 Ошибка отправки: {e}")
          EOF
          
          cat << 'EOF' > main.py
          import asyncio, aiohttp
          from datetime import datetime, timezone, timedelta
          from modules.config import SECTORS_CONFIG
          from modules.market import fetch_all_yahoo_data, fetch_all_israeli_funds
          from modules.news import fetch_sector_news, fetch_ipo_news
          from modules.formatter import build_telegram_message, build_ipo_message
          from modules.telegram_sender import send_to_telegram

          def calculate_sector_score(avg_change: float) -> int:
              return max(0, min(100, int(50 + (avg_change * 15.0))))

          async def run_market_analytics():
              all_tickers = set()
              for cfg in SECTORS_CONFIG.values():
                  all_tickers.update(cfg["tickers"])
              
              print(f"📦 Сбор данных Yahoo Finance...")
              global_market_data = await fetch_all_yahoo_data(list(all_tickers))

              print(f"🌐 Опрос израильских фондов...")
              il_results = await fetch_all_israeli_funds(SECTORS_CONFIG)

              async with aiohttp.ClientSession() as session:
                  sectors_results = []
                  
                  for key, cfg in SECTORS_CONFIG.items():
                      ticker_details = [(t, global_market_data[t]["change"]) for t in cfg["tickers"] if t in global_market_data and global_market_data[t]["price"] > 0]
                      
                      sorted_tickers = sorted(ticker_details, key=lambda x: abs(x[1]), reverse=True)
                      top_3_tickers = sorted_tickers[:3]
                      
                      valid_changes = [c for _, c in ticker_details]
                      avg_change = sum(valid_changes) / len(valid_changes) if valid_changes else 0.0
                      
                      score = calculate_sector_score(avg_change)
                      news = await fetch_sector_news(session, cfg["news_ticker"])
                      
                      sectors_results.append({
                          "short_eng": cfg["short_eng"],
                          "name": cfg["name"],
                          "icon": cfg["icon"],
                          "fund_id": cfg.get("fund_id", ""),
                          "avg_change": round(avg_change, 2),
                          "top_3_tickers": top_3_tickers,
                          "score": score,
                          "news": news,
                          "il_name_eng": cfg["il_name_eng"],
                          "il_fund_data": il_results.get(key, {"price": 0.0, "change": 0.0})
                      })
                  
                  sectors_results.sort(key=lambda x: x["avg_change"], reverse=True)
                      
                  message = build_telegram_message(sectors_results)
                  await send_to_telegram(message)

          async def run_ipo_digest():
              async with aiohttp.ClientSession() as session:
                  ipo_news = await fetch_ipo_news(session)
                  message = build_ipo_message(ipo_news)
                  await send_to_telegram(message)

          async def main():
              tz_il = timezone(timedelta(hours=3))
              weekday = datetime.now(tz_il).weekday()
              
              if weekday == 5:
                  await run_ipo_digest()
              else:
                  await run_market_analytics()

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
