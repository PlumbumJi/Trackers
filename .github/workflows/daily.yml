name: Automated Market Analytics

on:
  schedule:
    # Пн-Пт в 23:10 по Израилю (20:10 UTC) — Рыночная аналитика
    - cron: '10 20 * * 1-5'
    # Суббота в 22:00 по Израилю (19:00 UTC) — IPO отчет
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy Architecture Files
