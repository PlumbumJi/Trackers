name: Automated Market Analytics

on:
  schedule:
    - cron: '10 20 * * 1-5'
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Install Python Dependencies
        run: |
          pip install aiohttp playwright

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Deploy Architecture Files
        run: |
          mkdir -p modules
          touch modules/__init__.py
          
          cat << 'EOF' > requirements.txt
          aiohttp==3.11.11
          playwright==1.41.0
          EOF
          
          cat << 'EOF' > modules/config.py
