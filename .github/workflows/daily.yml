                  "il_name_eng": "Tachlit US Aerospace",
                  "tickers": ["BA", "EADSY", "LMT", "RTX", "ITA"]
              },
              "E-Commerce": {
                  "name": "Электронная коммерция", "icon": "🛒", "short_eng": "Ecom", "news_ticker": "IBUY", "il_fund": "5131420", 
                  "il_name_eng": "Meitav E-Commerce",
                  "tickers": ["AMZN", "SHOP", "MELI", "IBUY"]
              },
              "Cloud": {
                  "name": "Облачные технологии", "icon": "☁️", "short_eng": "Cloud", "news_ticker": "WCLD", "il_fund": "5132170", 
                  "il_name_eng": "Harel Cloud Comp.",
                  "tickers": ["MSFT", "AMZN", "GOOGL", "ORCL", "SNOW", "WCLD", "CLOU"]
              }
          }
          EOF
          
          cat << 'EOF' > modules/market.py
          import aiohttp
          import asyncio
          import re
          from datetime import datetime
          from bs4 import BeautifulSoup
          from modules.config import HTTP_TIMEOUT, HEADERS

          async def fetch_single_ticker(session: aiohttp.ClientSession, ticker: str) -> tuple:
              api_ticker = f"^{ticker}" if ticker == "OVX" else ticker
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{api_ticker}?range=1d&interval=1m"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          data = await response.json()
                          result = data.get("chart", {}).get("result", [])
                          if result:
                              meta = result[0].get("meta", {})
                              price = meta.get("regularMarketPrice")
                              prev_close = meta.get("chartPreviousClose")
                              if price is not None and prev_close:
                                  change = ((price - prev_close) / prev_close) * 100
                                  return ticker, {"price": round(price, 2), "change": round(change, 2)}
              except Exception as e:
                  print(f"Ошибка тикера {ticker}: {e}")
              return ticker, {"price": 0.0, "change": 0.0}

          async def fetch_all_yahoo_data(tickers: list) -> dict:
              async with aiohttp.ClientSession() as session:
                  tasks = [fetch_single_ticker(session, t) for t in tickers]
                  results = await asyncio.gather(*tasks)
                  return dict(results)
              
          async def fetch_israeli_fund(session: aiohttp.ClientSession, fund_id: str) -> dict:
              url = f"https://www.funder.co.il/fund/{fund_id}"
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          html_content = await response.text()
                          soup = BeautifulSoup(html_content, 'lxml')
                          
                          # Если суббота (5) или воскресенье (6) — вытаскиваем показатели пятницы из таблицы истории
                          weekday = datetime.now().weekday()
                          if weekday in [5, 6]:
                              history_table = soup.find('table', id=re.compile("TableHistory|history|gvHistory"))
                              if history_table:
                                  rows = history_table.find_all('tr')
                                  for row in rows:
                                      cols = row.find_all('td')
                                      if len(cols) >= 3:
                                          text_c = cols[2].text.strip().replace("%", "").replace("+", "")
                                          text_p = cols[1].text.strip().replace(",", "")
                                          try:
                                              change_val = float(text_c)
                                              price_val = float(text_p)
                                              return {"price": round(price_val, 2), "change": round(change_val, 2)}
                                          except ValueError:
                                              continue
                          
                          # Стандартный рабочий режим (Пн-Пт)
                          price_el = soup.find(id=re.compile("lblLastRate$|LastRate$"))
                          change_el = soup.find(id=re.compile("lblDailyChange$|DailyChange$"))
                          
                          price_val = 0.0
                          change_val = 0.0
                          
                          if price_el:
                              raw_p = re.sub(r'[^\d\.]', '', price_el.text.strip().replace(",", ""))
                              price_val = float(raw_p) if raw_p else 0.0
                          
                          if change_el:
                              raw_c = change_el.text.strip().replace("%", "").replace("+", "")
                              if not raw_c or raw_c in ["-", "—", "0"]:
                                  history_table = soup.find('table', id=re.compile("TableHistory|history|gvHistory"))
                                  if history_table:
                                      rows = history_table.find_all('tr')
                                      if len(rows) > 1:
                                          cols = rows[1].find_all('td')
                                          if len(cols) >= 3:
                                              raw_c = cols[2].text.strip().replace("%", "").replace("+", "")
                              
                              change_val = float(raw_c) if raw_c else 0.0
                              
                          return {"price": round(price_val, 2), "change": round(change_val, 2)}
              except Exception as e:
                  print(f"Критическая ошибка парсинга Funder ID {fund_id}: {e}")
              return {"price": 0.0, "change": 0.0}
          EOF
          
          cat << 'EOF' > modules/news.py
          import aiohttp, urllib.parse, html, re
          from modules.config import HTTP_TIMEOUT, MAX_NEWS_PER_SECTOR, HEADERS
          
          def summarize_text(text: str) -> str:
              text = re.sub(r'\s*[:—-]\s*(Yahoo Finance|Reuters|Bloomberg|CNBC|Motley Fool|MarketWatch|MT Newswires|Zacks|Barrons\.com|24/7 Wall St\.).*$', '', text, flags=re.IGNORECASE)
              text = text.strip()
              if not text.endswith('.'): text += '.'
              if len(text) > 130:
                  text = text[:127] + "..."
              return text

          async def translate_text(session: aiohttp.ClientSession, text: str) -> str:
              try:
                  url = f"https://api.mymemory.translated.net/get?q={urllib.parse.quote(text)}&langpair=en|ru"
                  async with session.get(url, timeout=5) as resp:
                      if resp.status == 200:
                          return html.unescape((await resp.json()).get("responseData", {}).get("translatedText", text))
              except: pass
              return text

          async def fetch_sector_news(session: aiohttp.ClientSession, query_ticker: str) -> list:
              url = f"https://query1.finance.yahoo.com/v1/finance/search?q={query_ticker}"
              news_list = []
              try:
                  async with session.get(url, headers=HEADERS, timeout=HTTP_TIMEOUT) as response:
                      if response.status == 200:
                          for item in (await response.json()).get("news", [])[:MAX_NEWS_PER_SECTOR]:
                              title = item.get("title", "")
                              if title:
                                  short_title = summarize_text(title)
                                  translated = await translate_text(session, short_title)
                                  news_list.append(f"• {translated}")
              except: pass
              return news_list or ["• Значимых новостей не зафиксировано."]
          EOF
          
          cat << 'EOF' > modules/formatter.py
          from datetime import datetime

          def escape_html(text: str) -> str:
              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def get_score_emoji(score: int) -> str:
              if score >= 75: return "🟢"
              if score >= 45: return "🟡"
              return "🔴"

          def build_telegram_message(sectors_data: list) -> str:
              sorted_sectors = sorted(sectors_data, key=lambda x: x['score'], reverse=True)
              now_str = datetime.now().strftime("%d.%m.%Y | 23:15")
              
              lines = [
                  "📊 <b>MARKET ANALYTICS REPORT</b>",
                  f"📅 {now_str} 🇮🇱\n",
                  "<b>🌍 GLOBAL HEAT MAP MATRIX</b>",
              ]
              
              lines.append("<code>💼 Name     US     IL     Рейтинг</code>")
              lines.append("<code>" + "-" * 33 + "</code>")
              
              lines.append("<code>")
              for s in sorted_sectors:
                  icon = s['icon']
                  name = s['short_eng'][:6]
                  tag_emoji = get_score_emoji(s['score'])
                  
                  us_ch = s['avg_change']
                  il_ch = s['il_fund_data']['change'] 
                  
                  us_str = f"+{us_ch:.1f}%" if us_ch > 0 else f"{us_ch:.1f}%"
                  il_str = f"+{il_ch:.1f}%" if il_ch > 0 else f"{il_ch:.1f}%"
                  
                  if il_ch == 0.0:
                      il_str = " 0.0%"
                  
                  score_str = f"{tag_emoji}{s['score']:>3}/100"
                  row = f"{icon}{name:<6} {us_str:>5} {il_str:>5}  {score_str}"
                  lines.append(row)
              lines.append("</code>")
              
              lines.append('\n<blockquote expandable>')
              lines.append("🔍 <b>ДЕТАЛЬНАЯ АНАЛИТИКА И ДВИЖЕНИЕ АКТИВОВ</b>\n")
              
              for s in sorted_sectors:
                  ch_sign = f"+{s['avg_change']:.2f}%" if s['avg_change'] > 0 else f"{s['avg_change']:.2f}%"
                  lines.append(f"<b>{s['icon']} {s['name'].upper()}</b> ({ch_sign})")
                  
                  if s.get('top_movers'):
                      mover_tokens = []
                      for ticker, ch in s['top_movers']:
                          m_emoji = "📈" if ch >= 0 else "📉"
                          m_sign = f"+{ch:.2f}%" if ch > 0 else f"{ch:.2f}%"
                          mover_tokens.append(f"{m_emoji}{ticker}({m_sign})")
                      lines.append("  " + "  ".join(mover_tokens))
                  
                  for n in s['news']:
                      lines.append(f"  {escape_html(n)}")
                  lines.append("") 
                  
              lines.append("</blockquote>")
              
              lines.append("\n🇮🇱 <b>TA STOCK MARKET (ФОНДЫ ИНДУСТРИЙ)</b>")
              lines.append("<code>" + "-" * 33 + "</code>")
              
              for s in sorted_sectors:
                  il_ch = s['il_fund_data']['change']
                  
                  if il_ch > 0:
                      ch_emoji = "🟢"
                      ch_sign = f"+{il_ch:.2f}%"
                  elif il_ch < 0:
                      ch_emoji = "🔴"
                      ch_sign = f"{il_ch:.2f}%"
                  else:
                      ch_emoji = "⚪"
                      ch_sign = f" {il_ch:.2f}%"
                  
                  lines.append(f"{ch_emoji} <code>{s['icon']} {s['il_name_eng']:<20} | {ch_sign}</code>")

              lines.append("\n⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡︎ ⚡️\n")
              lines.append("@oil_tracker_pavel_bot")
              return "\n".join(lines)
          EOF
          
          cat << 'EOF' > modules/telegram_sender.py
          import aiohttp
          from modules.config import BOT_TOKEN, CHAT_ID, HTTP_TIMEOUT
          
          async def send_to_telegram(text: str):
              if not BOT_TOKEN or not CHAT_ID:
                  print("❌ Ошибка конфигурации: Отсутствуют BOT_TOKEN или CHAT_ID")
                  return
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              payload = {
                  "chat_id": CHAT_ID,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True
              }
              async with aiohttp.ClientSession() as session:
                  try:
                      async with session.post(url, json=payload, timeout=HTTP_TIMEOUT) as resp:
                          resp_text = await resp.text()
                          if resp.status == 200:
                              print("🚀 Сообщение успешно отправлено в Telegram!")
                          else:
                              print(f"❌ Ошибка Telegram API (Статус {resp.status}): {resp_text}")
                  except Exception as e: 
                      print(f"💥 Критическая сетевая ошибка при отправке: {e}")
          EOF
          
          cat << 'EOF' > main.py
          import asyncio, aiohttp
          from modules.config import SECTORS_CONFIG
          from modules.market import fetch_all_yahoo_data, fetch_israeli_fund
          from modules.news import fetch_sector_news
          from modules.formatter import build_telegram_message
          from modules.telegram_sender import send_to_telegram

          def calculate_sector_score(avg_change: float) -> int:
              base_score = 55
              score = int(base_score + (avg_change * 16.5))
              return max(0, min(100, score))

          async def main():
              all_tickers = set()
              for cfg in SECTORS_CONFIG.values():
                  all_tickers.update(cfg["tickers"])
              
              print(f"📦 Сбор рыночных данных для {len(all_tickers)} уникальных тикеров...")
              global_market_data = await fetch_all_yahoo_data(list(all_tickers))
              
              async with aiohttp.ClientSession() as session:
                  sectors_results = []
                  
                  il_tasks = {}
                  for key, cfg in SECTORS_CONFIG.items():
                      if cfg["il_fund"]:
                          il_tasks[key] = fetch_israeli_fund(session, cfg["il_fund"])
                  
                  il_results = {}
                  if il_tasks:
                      il_keys = list(il_tasks.keys())
                      il_res_data = await asyncio.gather(*il_tasks.values())
                      il_results = dict(zip(il_keys, il_res_data))
                  
                  for key, cfg in SECTORS_CONFIG.items():
                      valid_changes = []
                      ticker_movers = []
                      
                      for t in cfg["tickers"]:
                          if t in global_market_data and global_market_data[t]["price"] > 0:
                              ch_val = global_market_data[t]["change"]
                              valid_changes.append(ch_val)
                              ticker_movers.append((t, ch_val))
                      
                      avg_change = sum(valid_changes) / len(valid_changes) if valid_changes else 0.0
                      score = calculate_sector_score(avg_change)
                      news = await fetch_sector_news(session, cfg["news_ticker"])
                      
                      top_movers = []
                      if ticker_movers:
                          sorted_movers = sorted(ticker_movers, key=lambda x: x[1], reverse=True)
                          top_movers.append(sorted_movers[0]) 
                          if len(sorted_movers) > 1:
                              top_movers.append(sorted_movers[-1])
                      
                      sectors_results.append({
                          "name_eng": key,
                          "short_eng": cfg["short_eng"],
                          "name": cfg["name"],
                          "icon": cfg["icon"],
                          "avg_change": round(avg_change, 2),
                          "score": score,
                          "top_movers": top_movers,
                          "news": news,
                          "il_id": cfg["il_fund"],
                          "il_name_eng": cfg["il_name_eng"],
                          "il_fund_data": il_results.get(key, {"price": 0.0, "change": 0.0})
                      })
                      
                  message = build_telegram_message(sectors_results)
                  await send_to_telegram(message)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
